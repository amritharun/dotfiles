# remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-c
bind-key C-c send-prefix

# split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# turn mouse mode on
set -g mouse on

# don't rename windows automatically
set-option -g allow-rename off

# vim-like navigation for tmux
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# remove delay for escape key
set -s escape-time 0

######################
### DESIGN CHANGES ###
######################

# loud or quiet?
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

#  modes
setw -g clock-mode-colour colour5
setw -g mode-style 'fg=colour1 bg=colour18 bold'

# panes
set -g pane-border-style 'fg=colour19 bg=colour0'
set -g pane-active-border-style 'bg=colour0 fg=colour9'

# statusbar
set -g status-position bottom
set -g status-justify left
set -g status-style 'bg=colour18 fg=colour137 dim'
set -g status-left ''
set -g status-right '#[fg=colour233,bg=colour19] %d/%m #[fg=colour233,bg=colour8] %H:%M:%S '
set -g status-right-length 50
set -g status-left-length 20

setw -g window-status-current-style 'fg=colour1 bg=colour19 bold'
setw -g window-status-current-format ' #I#[fg=colour249]:#[fg=colour255]#W#[fg=colour249]#F '

setw -g window-status-style 'fg=colour9 bg=colour18'
setw -g window-status-format ' #I#[fg=colour237]:#[fg=colour250]#W#[fg=colour244]#F '

setw -g window-status-bell-style 'fg=colour255 bg=colour1 bold'

# messages
set -g message-style 'fg=colour232 bg=colour16 bold'
# >>> devpod_setup tmux overrides >>>
# Recommended tmux + Ghostty baseline (per Ghostty docs).
set -g default-terminal "tmux-256color"
# Tell tmux about features the OUTER terminal (Ghostty) supports. The
# xterm-ghostty terminfo declares only colors#256, so without this tmux would
# downsample 24-bit color to 256 and break true-color rendering of prompts,
# statuslines, syntax highlighting, etc. RGB is the modern equivalent of the
# old `xterm-256color:RGB` terminal-overrides hack and it actually matches
# our outer terminal name.
set -as terminal-features ",xterm-ghostty:RGB"
set -g focus-events on

# Receive shifted-modifier keys from Ghostty (kitty keyboard protocol)
# — without this, Ctrl+L and Ctrl+Shift+L look identical to tmux.
set -s extended-keys on
set -as terminal-features ",xterm-ghostty:extkeys"

# Ctrl+Shift+L: clear visible pane AND scrollback (true "full clear").
# Plain Ctrl+L stays untouched (shells handle it natively as clear-screen).
bind -n C-S-l send-keys C-l \; clear-history

# Reload bind: prefix + r re-sources the conf without restarting the server.
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# Force-redraw bind: prefix + R repaints the active client. Use this when a
# pane goes blank — the contents are still in tmux's buffer, only the render
# is stale. (Same effect as scrolling, without scrolling.)
bind R refresh-client \; display-message "client refreshed"

# Auto-refresh on pane switch: fires after every select-pane (keybind, mouse,
# prefix+o, etc.). Cheap — tmux only repaints diffs — and prevents the blank-
# pane-after-switch flicker entirely.
set-hook -g after-select-pane 'refresh-client'

# When multiple clients are attached to the same session, only constrain the
# *active* window to the smallest client size, not every window. Without this,
# any momentary size change in one client (font reload, focus animation,
# Ghostty padding shifts) clamps and re-expands every window in the session,
# leaving freshly-revealed cells blank until something repaints them.
setw -g aggressive-resize on
# <<< devpod_setup tmux overrides <<<
